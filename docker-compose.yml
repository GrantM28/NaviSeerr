services:
  naviseerr:
    build: .
    container_name: naviseerr
    ports:
      - "3000:3000"
    environment:
      NAVIDROME_URL: ${NAVIDROME_URL:-http://navidrome:4533}
      NAVIDROME_USERNAME: ${NAVIDROME_USERNAME:-admin}
      NAVIDROME_PASSWORD: ${NAVIDROME_PASSWORD:-change-me}
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      REQUEST_WEBHOOK_URL: ${REQUEST_WEBHOOK_URL:-}
      MUSICBRAINZ_CONTACT: ${MUSICBRAINZ_CONTACT:-}
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
